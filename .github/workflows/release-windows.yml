name: Release

# Push a tag like `v0.1.0` (or run manually) to build EVERY release artifact.
# Attached to the GitHub release for that tag:
#   * the Flutter Windows desktop app, packaged with Inno Setup (unsigned for
#     now — see installer/mica.iss); this drives the in-app auto-updater.
#   * the `mica-cli` binary for Windows / Linux / macOS (a pure, thin HTTP client
#     over the REST API — no backup engine baked in; see docs/backup.md).
# Pushed to the container registries (`images` job):
#   * mica-api / mica-web / mica-cli, tagged with the IMMUTABLE version.
#
# Deploying is deliberately NOT here: rolling prod is a human step
# (`just deploy-prod X.Y.Z`). Letting CI deploy would mean putting a prod root
# SSH key in GitHub secrets — a repo/Actions compromise would become a prod
# compromise. CI only ever holds registry-push credentials. See docs/release.md.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without the leading v (e.g. 0.1.0)'
        required: true
      publish:
        description: 'Publish the installer to a GitHub release (off = dry-run: build + package + upload artifact only)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: clients/mica_flutter
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=v$v" >> "$GITHUB_OUTPUT"

      - run: flutter config --enable-windows-desktop

      - run: flutter pub get

      - run: flutter build windows --release

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: >
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          /DAppVersion=${{ steps.ver.outputs.version }} installer\mica.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mica-Setup-${{ steps.ver.outputs.version }}
          path: clients/mica_flutter/installer/Output/Mica-Setup-${{ steps.ver.outputs.version }}.exe
          if-no-files-found: error

      - name: Publish installer to release
        # Tag pushes always publish; manual runs only when publish=true (else
        # it's a dry-run that just builds + uploads the artifact above).
        if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          # Stable, not prerelease: the in-app updater checks GitHub's
          # /releases/latest, which SKIPS prereleases — marking releases
          # prerelease made new versions invisible to auto-update. make_latest
          # keeps /releases/latest pointing at the newest tag.
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          files: clients/mica_flutter/installer/Output/Mica-Setup-${{ steps.ver.outputs.version }}.exe

  cli:
    # Build + publish the mica-cli binary for each desktop OS. `needs: windows`
    # so the installer (and make_latest) lands on the release FIRST — the in-app
    # updater reads /releases/latest, and we never want it to see a release whose
    # installer asset isn't attached yet. These legs only attach binaries.
    needs: windows
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bin: mica-cli.exe
            suffix: windows-x64.exe
          - os: ubuntu-latest
            bin: mica-cli
            suffix: linux-x64
          - os: macos-latest
            bin: mica-cli
            suffix: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=v$v" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # One shared cache across the matrix would collide (different OSes);
          # rust-cache already namespaces by runner OS. Key by the crate so the
          # desktop job's (nonexistent) Rust cache never mixes in.
          key: mica-cli

      # Pure-Rust build: reqwest uses rustls-tls (no OpenSSL), so Linux/macOS
      # need no system TLS libs. --locked pins to the committed Cargo.lock.
      - name: Build mica-cli
        shell: bash
        run: cargo build --locked -p mica-cli --release

      - name: Stage binary
        id: stage
        shell: bash
        run: |
          asset="mica-cli-${{ steps.ver.outputs.version }}-${{ matrix.suffix }}"
          cp "target/release/${{ matrix.bin }}" "$asset"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - name: Upload cli artifact
        uses: actions/upload-artifact@v4
        with:
          name: mica-cli-${{ matrix.suffix }}
          path: ${{ steps.stage.outputs.asset }}
          if-no-files-found: error

      - name: Publish cli binary to release
        # Same gate as the installer: tag pushes always publish; manual runs only
        # when publish=true (else dry-run = build + artifact only). The release
        # already exists (needs: windows created it) — this just attaches a file.
        if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          files: ${{ steps.stage.outputs.asset }}

  images:
    # The three images compose runs in prod (api, web, and cli — the `backup`
    # service). All three are keyed to ${MICA_VERSION}, so they must be pushed
    # TOGETHER at the same tag or a release leaves `backup` unable to pull.
    #
    # Pushed to BOTH registries: Aliyun ACR is what prod pulls (first-party,
    # fast in CN); Docker Hub is the off-site copy. Prod used to depend on a
    # third-party pull-through mirror (docker.1ms.run), which caches tag->digest
    # and could hand back a stale image for a rolling tag — hence ACR + the
    # IMMUTABLE version tag (never `latest`): a tag that never existed before
    # cannot be served stale.
    #
    # Runs independently of the release jobs (attaches nothing to the release).
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - img: api
            file: deploy/Dockerfile.api
          - img: web
            file: deploy/Dockerfile.web
            flutter: true
          - img: cli
            file: deploy/Dockerfile.cli
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      # Only the web image needs a Flutter bundle baked in.
      - uses: subosito/flutter-action@v2
        if: ${{ matrix.flutter }}
        with:
          channel: stable
          cache: true

      - name: Build + stage the web bundle
        if: ${{ matrix.flutter }}
        run: |
          cd clients/mica_flutter
          flutter pub get
          flutter build web --release
          cd ../..
          rm -rf deploy/web && mkdir -p deploy/web
          cp -r clients/mica_flutter/build/web/. deploy/web/

      - uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: registry.cn-shenzhen.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build + push mica-${{ matrix.img }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          # Buildx defaults attach an OCI attestation manifest, turning the
          # image into a multi-manifest index that some registries / a plain
          # `docker save | docker load` cannot resolve.
          provenance: false
          sbom: false
          tags: |
            registry.cn-shenzhen.aliyuncs.com/willspace/mica-${{ matrix.img }}:v${{ steps.ver.outputs.version }}
            willdockerhub/mica-${{ matrix.img }}:v${{ steps.ver.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.img }}
          cache-to: type=gha,mode=max,scope=${{ matrix.img }}
