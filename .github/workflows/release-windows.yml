name: Release (Windows)

# Push a tag like `v0.1.0` (or run manually) to build the Flutter Windows
# desktop app, package it with Inno Setup, and attach the installer to the
# GitHub release. Unsigned for now — see installer/mica.iss.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without the leading v (e.g. 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: clients/mica_flutter
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=v$v" >> "$GITHUB_OUTPUT"

      - run: flutter config --enable-windows-desktop

      - run: flutter pub get

      - run: flutter build windows --release

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: >
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          /DAppVersion=${{ steps.ver.outputs.version }} installer\mica.iss

      - name: Publish installer to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          prerelease: true
          fail_on_unmatched_files: true
          files: clients/mica_flutter/installer/Output/Mica-Setup-${{ steps.ver.outputs.version }}.exe
