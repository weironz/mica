name: Release

# Push a tag like `v0.1.0` (or run manually) to build EVERY release artifact.
# Attached to the GitHub release for that tag:
#   * the Flutter Windows desktop app, packaged with Inno Setup (unsigned for
#     now — see installer/mica.iss); this drives the in-app auto-updater.
#   * the `mica-cli` binary for Windows / Linux / macOS (a pure, thin HTTP client
#     over the REST API — no backup engine baked in; see docs/backup.md).
# Pushed to the container registries (`images` job):
#   * mica-api / mica-web / mica-cli, tagged with the IMMUTABLE version.
#
# Deploying is deliberately NOT here: rolling prod is a human step
# (`just deploy-prod X.Y.Z`). Letting CI deploy would mean putting a prod root
# SSH key in GitHub secrets — a repo/Actions compromise would become a prod
# compromise. CI only ever holds registry-push credentials. See docs/release.md.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without the leading v (e.g. 0.1.0)'
        required: true
      publish:
        description: 'Publish the installer to a GitHub release (off = dry-run: build + package + upload artifact only)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # Create the release as a DRAFT before anything builds, so every producing job
  # can attach its assets in parallel.
  #
  # `cli` used to carry `needs: windows` purely for ordering: the in-app updater
  # reads /releases/latest and must never see a version whose installer is not
  # attached yet. That guarantee was real, but serialising bought it at the price
  # of the whole windows job — measured on v0.12.8, cli sat idle for 11.3 min and
  # the run took 15.0 min instead of ~11.5.
  #
  # A draft gives the SAME guarantee for ~10 s: draft releases are invisible to
  # /releases/latest. Nothing is publicly visible until `publish` flips it at the
  # end, by which point every asset is attached.
  #
  # This job is deliberately NOT gated on the publish condition — only the step
  # inside it is. Gating the job would make `needs: draft` skip the builders on a
  # dry run (workflow_dispatch with publish=false), which must keep building and
  # uploading artifacts as it does today.
  draft:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=v$v" >> "$GITHUB_OUTPUT"

      - name: Create the draft release
        if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          draft: true

  windows:
    needs: draft
    runs-on: windows-latest
    # NOTE: sccache was tried here and removed (v0.12.18) — measured 0% hit rate.
    # The GitHub Actions cache is scoped per git-ref and this job only runs on tag
    # pushes, so each release starts from an empty cache and never reuses the
    # previous release's units. Even with hits it could only cache the Rust FFI
    # slice; the job's long pole is `flutter build windows` (Dart/C++), which no
    # Rust cache touches. rust-cache (below) stays: low overhead, and it at least
    # keeps third-party deps. See docs/lessons.md.
    defaults:
      run:
        working-directory: clients/mica_flutter
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=v$v" >> "$GITHUB_OUTPUT"

      - run: flutter config --enable-windows-desktop

      # `flutter build windows` compiles the Rust FFI crate too — cargokit builds
      # `rust_lib_mica_flutter` (see windows/flutter/generated_plugins.cmake) —
      # and that was entirely uncached: yrs, mica-core, mica-markdown and merman
      # recompiled in RELEASE mode on every single run.
      #
      # Measured on v0.12.8: `flutter build windows --release` took 522 s — 78%
      # of this job and 58% of the whole run's critical path. For contrast, the
      # `cli` job does a full Rust build of the same dependency tree in 3.7 min
      # WITH this cache.
      #
      # `workspaces:` points at the FFI crate because it declares its own
      # `[workspace]` (it sits inside the backend tree but is not a member).
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/mica_flutter/rust
          # Distinct from the cli job's `mica-cli` key: different crate, different
          # profile. One shared key would just thrash both.
          key: mica-flutter-ffi

      - run: flutter pub get

      - run: flutter build windows --release

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: >
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          /DAppVersion=${{ steps.ver.outputs.version }} installer\mica.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v5
        with:
          name: Mica-Setup-${{ steps.ver.outputs.version }}
          path: clients/mica_flutter/installer/Output/Mica-Setup-${{ steps.ver.outputs.version }}.exe
          if-no-files-found: error

      # Smoke-test the ACTUAL packaged installer before it can reach a release.
      # The in-app updater ships this exact .exe to every user, yet nothing so far
      # has run it: build success only proves it compiled and ISCC zipped it.
      # Here we silently install it and launch the installed app — if it can't
      # even survive 10 s, the job fails and the release never publishes.
      #
      # Placed AFTER the artifact upload (so a failed smoke still leaves the .exe
      # downloadable for post-mortem) and BEFORE "Publish installer to release"
      # (which, being a later step, is skipped once this one fails).
      - name: Smoke-test the installer (install + launch)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ver = '${{ steps.ver.outputs.version }}'
          $setup = "installer\Output\Mica-Setup-$ver.exe"   # cwd = clients/mica_flutter
          # Force a known install dir so exe location needs no guessing. /DIR
          # overrides the .iss DefaultDirName even under PrivilegesRequired=lowest.
          $installDir = Join-Path $env:RUNNER_TEMP 'mica-smoke'

          Write-Host "Silent-installing $setup -> $installDir"
          # NO -Wait: `-Wait` on the installer hung 28min on run 29937817979.
          # The exact cause is unconfirmed — the .iss [Run] has `nowait`, so the
          # obvious "installer blocks on the app it launched" theory does NOT
          # hold — but it does not matter here: the real auto-updater runs Setup
          # DETACHED (ProcessStartMode.detached in updater_desktop.dart), so the
          # installer's exit timing is irrelevant in production. Poll for the
          # installed exe instead — Inno writes every file before running [Run],
          # so the exe existing IS the "install finished" signal, independent of
          # when (or whether) the installer process returns. Hard timeout guards
          # a run that is genuinely stuck.
          # /SKIPRUN suppresses the installer's [Run] auto-launch (mica.iss gates
          # it on `not CmdLineParamExists('/SKIPRUN')`) so THIS step is the sole
          # launcher of the app — the single-instance mutex can never be contended
          # and the old "exited 0" race is structurally impossible. The updater
          # never passes it, so production's silent relaunch is unchanged.
          $inst = Start-Process -FilePath $setup `
            -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/SKIPRUN',"/DIR=$installDir" `
            -PassThru
          $exe = Join-Path $installDir 'mica_flutter.exe'
          $deadline = (Get-Date).AddSeconds(120)
          while (-not (Test-Path $exe) -and (Get-Date) -lt $deadline) {
            if ($inst.HasExited -and $inst.ExitCode -ne 0) {
              throw "installer exited with code $($inst.ExitCode) before producing $exe"
            }
            Start-Sleep -Seconds 2
          }
          if (-not (Test-Path $exe)) { throw "installed exe not found after 120s: $exe" }
          Write-Host "Installed OK: $exe"

          # We are the ONLY launcher (installer ran with /SKIPRUN), so there is no
          # second instance and the single-instance mutex is never contended — the
          # flaky "exited within 10s (exit code 0)" race is gone by construction.
          # A launch that dies is now a REAL signal: a missing/mismatched DLL makes
          # the Windows loader kill the process immediately (STATUS_DLL_NOT_FOUND =
          # 0xC0000135), which is exactly the broken-build regression this smoke
          # test exists to catch. Log the exit code in hex so that is legible
          # rather than a mysterious 0.
          $app = Start-Process -FilePath $exe -PassThru
          try {
            Write-Host "Launched Mica (pid $($app.Id)); waiting 10s to confirm it stays up..."
            Start-Sleep -Seconds 10
            $app.Refresh()
            if ($app.HasExited) {
              throw "Mica exited within 10s (exit code 0x$('{0:X8}' -f $app.ExitCode)) - install/launch smoke FAILED"
            }
            Write-Host "Mica still alive 10s after launch (pid $($app.Id)) - smoke OK"
          } finally {
            # Leave no stray process behind: the app, plus the installer if it is
            # still lingering.
            if (-not $app.HasExited) { Stop-Process -Id $app.Id -Force -ErrorAction SilentlyContinue }
            if ($inst -and -not $inst.HasExited) { Stop-Process -Id $inst.Id -Force -ErrorAction SilentlyContinue }
          }

      - name: Publish installer to release
        # Tag pushes always publish; manual runs only when publish=true (else
        # it's a dry-run that just builds + uploads the artifact above).
        if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          # Stays a draft until the `publish` job flips it — otherwise this
          # upload would publish a release that has no cli binaries yet, which is
          # the exact window the old `needs: windows` ordering existed to close.
          draft: true
          # Stable, not prerelease: the in-app updater checks GitHub's
          # /releases/latest, which SKIPS prereleases — marking releases
          # prerelease made new versions invisible to auto-update. `publish` is
          # what sets --latest, once every asset is attached.
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          files: clients/mica_flutter/installer/Output/Mica-Setup-${{ steps.ver.outputs.version }}.exe

  cli:
    # Build + publish the mica-cli binary for each desktop OS.
    #
    # `needs: draft`, NOT `needs: windows`. The ordering this used to enforce —
    # installer on the release before anything else — is now guaranteed by the
    # release being a draft until `publish` runs, so these legs no longer wait
    # out an 11-minute Windows build to attach an 8 MB binary.
    needs: draft
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bin: mica-cli.exe
            suffix: windows-x64.exe
          - os: ubuntu-latest
            bin: mica-cli
            suffix: linux-x64
          - os: macos-latest
            bin: mica-cli
            suffix: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=v$v" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # One shared cache across the matrix would collide (different OSes);
          # rust-cache already namespaces by runner OS. Key by the crate so the
          # desktop job's (nonexistent) Rust cache never mixes in.
          key: mica-cli

      # Pure-Rust build: reqwest uses rustls-tls (no OpenSSL), so Linux/macOS
      # need no system TLS libs. --locked pins to the committed Cargo.lock.
      - name: Build mica-cli
        shell: bash
        run: cargo build --locked -p mica-cli --release

      - name: Stage binary
        id: stage
        shell: bash
        run: |
          asset="mica-cli-${{ steps.ver.outputs.version }}-${{ matrix.suffix }}"
          cp "target/release/${{ matrix.bin }}" "$asset"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - name: Upload cli artifact
        uses: actions/upload-artifact@v5
        with:
          name: mica-cli-${{ matrix.suffix }}
          path: ${{ steps.stage.outputs.asset }}
          if-no-files-found: error

      - name: Attach cli binary to the draft release
        # Same gate as the installer: tag pushes always publish; manual runs only
        # when publish=true (else dry-run = build + artifact only). The draft
        # release already exists (the `draft` job created it) — this only attaches
        # a file, and `draft: true` keeps it unpublished until `publish` runs.
        if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          draft: true
          prerelease: false
          fail_on_unmatched_files: true
          files: ${{ steps.stage.outputs.asset }}

  images:
    # The three images compose runs in prod (api, web, and cli — the `backup`
    # service). All three are keyed to ${MICA_VERSION}, so they must be pushed
    # TOGETHER at the same tag or a release leaves `backup` unable to pull.
    #
    # Pushed to BOTH registries: Aliyun ACR is what prod pulls (first-party,
    # fast in CN); Docker Hub is the off-site copy. Prod used to depend on a
    # third-party pull-through mirror (docker.1ms.run), which caches tag->digest
    # and could hand back a stale image for a rolling tag — hence ACR + the
    # IMMUTABLE version tag (never `latest`): a tag that never existed before
    # cannot be served stale.
    #
    # Runs independently of the release jobs (attaches nothing to the release).
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - img: api
            file: deploy/Dockerfile.api
          - img: web
            file: deploy/Dockerfile.web
            flutter: true
          - img: cli
            file: deploy/Dockerfile.cli
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      # Only the web image needs a Flutter bundle baked in.
      - uses: subosito/flutter-action@v2
        if: ${{ matrix.flutter }}
        with:
          channel: stable
          cache: true

      - name: Build + stage the web bundle
        if: ${{ matrix.flutter }}
        run: |
          cd clients/mica_flutter
          flutter pub get
          # --no-web-resources-cdn: serve CanvasKit same-origin instead of from
          # www.gstatic.com (CORP-header dependency + unreliable from CN).
          flutter build web --release --no-web-resources-cdn
          cd ../..
          # Runtime font fallback is served same-origin from web/gfonts; make
          # sure the committed mirror matches THIS Flutter's engine tables
          # before baking the image (shard URLs are engine-version-pinned).
          bash clients/mica_flutter/tool/gfonts/mirror.sh --check
          rm -rf deploy/web && mkdir -p deploy/web
          cp -r clients/mica_flutter/build/web/. deploy/web/

      - uses: docker/setup-buildx-action@v4

      - name: Login to Aliyun ACR
        uses: docker/login-action@v4
        with:
          registry: registry.cn-shenzhen.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build + push mica-${{ matrix.img }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          # Buildx defaults attach an OCI attestation manifest, turning the
          # image into a multi-manifest index that some registries / a plain
          # `docker save | docker load` cannot resolve.
          provenance: false
          sbom: false
          tags: |
            registry.cn-shenzhen.aliyuncs.com/willspace/mica-${{ matrix.img }}:v${{ steps.ver.outputs.version }}
            willdockerhub/mica-${{ matrix.img }}:v${{ steps.ver.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.img }}
          cache-to: type=gha,mode=max,scope=${{ matrix.img }}

  # Flip the draft to published, last. Everything the in-app updater looks for is
  # attached by now: /releases/latest goes from "the previous version" straight to
  # "this version, complete" with no window in between.
  #
  # Deliberately NOT `needs: images`. The GitHub release carries the installer and
  # the cli binaries; the container images go to ACR and are consumed by
  # `just deploy-prod`, a separate path. A registry hiccup should not hold back a
  # desktop release that is fully built — and a failed images leg still turns the
  # whole run red, so it cannot pass unnoticed.
  #
  # IF THIS JOB FAILS the release stays a draft: assets are safe and nothing is
  # publicly broken, but users see no update until you run
  #   gh release edit vX.Y.Z --draft=false --latest
  publish:
    needs: [draft, windows, cli]
    if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ needs.draft.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" --draft=false --latest

          # `isLatest` is NOT a field `gh release view --json` accepts, and asking
          # for it exits 1. On v0.12.9 the edit above had already published the
          # release correctly — 4 assets, /releases/latest pointing at it — and
          # only this line failed, turning a good release into a red run. Worse
          # than cosmetic: a publish job that goes red while actually succeeding
          # trains you to shrug at the one that genuinely fails.
          #
          # Read "is this the latest" from the endpoint the in-app updater itself
          # reads, instead of from a field that does not exist.
          gh release view "${{ needs.draft.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" --json isDraft,assets \
            --jq '"draft=\(.isDraft) assets=\(.assets | length)"'
          latest=$(gh api "repos/$GITHUB_REPOSITORY/releases/latest" --jq .tag_name)
          echo "releases/latest -> $latest"
          [ "$latest" = "${{ needs.draft.outputs.tag }}" ] \
            || { echo "::error::/releases/latest is $latest, expected ${{ needs.draft.outputs.tag }} — the in-app updater will not see this release"; exit 1; }
