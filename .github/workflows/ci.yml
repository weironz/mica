name: CI

# Fast pre-merge checks: compile the Rust backend workspace + run its pure
# (no-database) crate tests, and run the Flutter Dart unit tests. Every command
# here was verified green locally (2026-07-08): cargo test on the pure crates
# (~45 tests) and `flutter test test` (206 tests).
#
# Deliberately NOT covered yet (need infra a headless runner can't trivially
# provide — left for a reviewer to enable + validate against a real run):
#   - Postgres-backed tests (crates/app-core/tests/sync_pg.rs, mica-core sync,
#     api-server) — add a `services: postgres` block + run the migrations.
#   - The Windows integration_test suite (yrs sync e2e, page-switch fidelity) —
#     needs a desktop runner + the native FFI (flutter_rust_bridge) build.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  rust:
    name: Rust (build + pure-crate tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # rust-cache, NOT a hand-rolled actions/cache of `target`: caching the
      # whole target dir stored ~2.5GB PER ENTRY (and entries are scoped per
      # ref, so every tag push doubled it) — 5.1GB of the repo's 10GB cache
      # budget, blowing it past the limit and evicting everyone else's caches.
      # rust-cache prunes the workspace's own artifacts (they change every
      # commit and are worthless to restore) and keeps only deps: the cli job
      # using it sits at ~115MB, 20x smaller, for the same speedup.
      - uses: Swatinem/rust-cache@v2
        with:
          key: workspace
      # rust-toolchain.toml pins `stable` (+ rustfmt, clippy); rustup honors it.
      # sqlx uses the runtime query API (not compile-time macros), so the
      # workspace builds without a live database.
      - name: Build workspace
        run: cargo build --workspace
      - name: Test pure crates (no database needed)
        run: cargo test -p mica-markdown -p mica-core -p mica-interchange -p mica-mcp-server

  mcp-conformance:
    # Drive `mica-cli mcp` with the OFFICIAL MCP client and fail on anything
    # it rejects. This exists because hand-rolled probes do not catch protocol
    # bugs: ours shipped a server that declared no `tools` capability and an
    # `outputSchema` of "AnyValue", and it looked perfectly healthy — the probe
    # called tools/list directly and never validated a thing, so every real
    # client registered ZERO tools while we believed it worked. A conforming
    # client is the only thing that reads what we actually declare.
    name: MCP (official inspector against mica-cli mcp)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: workspace
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build mica-cli
        run: cargo build -p mica-cli
      # No live Mica needed: the handshake and tools/list are answered before
      # any REST call, which is exactly the surface that broke. A dummy PAT
      # keeps the credential chain satisfied without a server.
      - name: tools/list must survive a conforming client
        env:
          MICA_API_BASE_URL: https://mica.invalid
          MICA_PAT: dummy-not-used-for-handshake
        run: |
          set -euo pipefail
          npx -y @modelcontextprotocol/inspector@latest --cli \n            ./target/debug/mica-cli mcp --method tools/list > tools.json
          python3 - <<'EOF'
          import json, sys
          tools = json.load(open("tools.json"))["tools"]
          assert tools, "the inspector returned no tools"
          for t in tools:
              # The two bugs that shipped, pinned on the wire the client reads.
              assert t["inputSchema"].get("type") == "object", t["name"]
              out = t.get("outputSchema")
              assert out is None or out.get("type") == "object", (
                  f"{t['name']}: outputSchema must be an object schema or absent; "
                  "one invalid entry makes a client discard the whole list")
          print(f"{len(tools)} tools accepted by the official client")
          EOF

  flutter:
    name: Flutter (analyze + Dart unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/mica_flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      # Only fail on real errors — the tree still carries pre-existing info/
      # warning lints that a separate cleanup pass will address.
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - name: Dart unit tests
        run: flutter test test
