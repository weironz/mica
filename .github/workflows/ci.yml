name: CI

# Fast pre-merge checks: compile the Rust backend workspace + run its pure
# (no-database) crate tests, and run the Flutter Dart unit tests. Every command
# here was verified green locally (2026-07-08): cargo test on the pure crates
# (~45 tests) and `flutter test test` (206 tests).
#
# Deliberately NOT covered yet (need infra a headless runner can't trivially
# provide — left for a reviewer to enable + validate against a real run):
#   - api-server's 59 tests (14 need Postgres) — the `services: postgres` block
#     below already provisions a database, so this is now just a `-p` away.
#   - The Windows integration_test suite (yrs sync e2e, page-switch fidelity) —
#     needs a desktop runner + the native FFI (flutter_rust_bridge) build.
#
# 2026-07-21 audit (docs/code-review-2026-07-20.md) found 167 tests that never
# ran here. Three causes, all fixed below:
#   - app-core / infra were simply absent from `-p`, which alone silenced SEVEN
#     pure-Rust, zero-dependency tests — including every bit of coverage for the
#     root-erasure read path (the 2026-07-19 incident).
#   - mica-core's `store` module is behind a non-default feature, so its 24
#     SQLite migration tests were never even COMPILED.
#   - sync_pg.rs skipped itself without a database. It now fails instead, so
#     this job must actually provision one.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  rust:
    name: Rust (build + lint + tests)
    runs-on: ubuntu-latest

    # sync_pg.rs asserts against real SQL (a conditional UPDATE IS the
    # concurrency guard); a mock would test nothing. Cheap here — one container.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mica
          POSTGRES_PASSWORD: mica
          POSTGRES_DB: mica
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U mica"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgres://mica:mica@127.0.0.1:5432/mica

    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      # rust-cache, NOT a hand-rolled actions/cache of `target`: caching the
      # whole target dir stored ~2.5GB PER ENTRY (and entries are scoped per
      # ref, so every tag push doubled it) — 5.1GB of the repo's 10GB cache
      # budget, blowing it past the limit and evicting everyone else's caches.
      # rust-cache prunes the workspace's own artifacts (they change every
      # commit and are worthless to restore) and keeps only deps: the cli job
      # using it sits at ~115MB, 20x smaller, for the same speedup.
      - uses: Swatinem/rust-cache@v2
        with:
          key: workspace
      # rust-toolchain.toml pins `stable` (+ rustfmt, clippy); rustup honors it.
      # sqlx uses the runtime query API (not compile-time macros), so the
      # workspace builds without a live database.
      - name: Build workspace
        run: cargo build --workspace

      # `invisible_characters` is deny-by-default and fired on the `&shy;` entity
      # in crates/markdown, which ABORTED clippy on the first crate — so the
      # other eight had never been linted at all. With that one false positive
      # allowed at its source, the whole workspace is clean, which is why this
      # can start life at -D warnings instead of as an advisory.
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Plain SQL, applied in order. sqlx-cli would have to be compiled first
      # (minutes); psql ships on the runner. The tests do not read the
      # _sqlx_migrations bookkeeping table, only the schema.
      - name: Apply migrations
        run: |
          set -euo pipefail
          for f in migrations/*.sql; do
            echo "==> $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -q -f "$f"
          done

      # mica-core's web_interop.rs is the yjs↔yrs cross-engine gate (CLAUDE.md
      # dependency exemption #7's load-bearing premise): it shells out to `node`
      # (preinstalled on GitHub-hosted runners) to run the COMMITTED web bundle
      # (clients/mica_flutter/web/yjs_bundle.js) headlessly against the yrs
      # side. No setup-node needed; on a bare self-hosted runner without node
      # the test fails loudly rather than skipping.
      - name: Test (incl. app-core + infra, Postgres-backed)
        run: cargo test -p mica-markdown -p mica-core -p mica-interchange -p mica-mcp-server -p mica-app-core -p mica-infra

      # Separate invocation: `store` is a non-default feature, and features do
      # not apply across a multi-package `-p` list. Without this the 24 local
      # SQLite migration tests are not compiled, let alone run.
      - name: Test mica-core's gated SQLite store
        run: cargo test -p mica-core --features store

  mcp-conformance:
    # Drive `mica-cli mcp` with the OFFICIAL MCP client and fail on anything
    # it rejects. This exists because hand-rolled probes do not catch protocol
    # bugs: ours shipped a server that declared no `tools` capability and an
    # `outputSchema` of "AnyValue", and it looked perfectly healthy — the probe
    # called tools/list directly and never validated a thing, so every real
    # client registered ZERO tools while we believed it worked. A conforming
    # client is the only thing that reads what we actually declare.
    name: MCP (official inspector against mica-cli mcp)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: workspace
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Build mica-cli
        run: cargo build -p mica-cli
      # No live Mica needed: the handshake and tools/list are answered before
      # any REST call, which is exactly the surface that broke. A dummy PAT
      # keeps the credential chain satisfied without a server.
      - name: tools/list must survive a conforming client
        env:
          MICA_API_BASE_URL: https://mica.invalid
          MICA_PAT: dummy-not-used-for-handshake
        run: |
          set -euo pipefail
          npx -y @modelcontextprotocol/inspector@latest --cli \
            ./target/debug/mica-cli mcp --method tools/list > tools.json
          python3 - <<'EOF'
          import json, sys
          tools = json.load(open("tools.json"))["tools"]
          assert tools, "the inspector returned no tools"
          for t in tools:
              # The two bugs that shipped, pinned on the wire the client reads.
              assert t["inputSchema"].get("type") == "object", t["name"]
              out = t.get("outputSchema")
              assert out is None or out.get("type") == "object", (
                  f"{t['name']}: outputSchema must be an object schema or absent; "
                  "one invalid entry makes a client discard the whole list")
          print(f"{len(tools)} tools accepted by the official client")
          EOF

  flutter:
    name: Flutter (analyze + Dart unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/mica_flutter
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      # Only fail on real errors — the tree still carries pre-existing info/
      # warning lints that a separate cleanup pass will address.
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - name: Dart unit tests
        run: flutter test test
      # dart2js resolves the WEB variant of every conditional import; analyze
      # and `flutter test` resolve the IO one. So an IO/web stub drift (a member
      # added to local_offline_io.dart but not mirrored in local_offline_web.dart)
      # compiles clean everywhere EXCEPT the release web image — exactly what
      # silently broke the v0.12.0–v0.12.3 web images at tag time. Compile the
      # web bundle on every push so that class of drift fails pre-merge.
      # Same flags as the release build (justfile build-web / release.yml) so
      # this checks the artifact we actually ship.
      - name: Web compiles (dart2js resolves the web stubs)
        run: flutter build web --release --no-web-resources-cdn
