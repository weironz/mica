name: Deploy

# Manual only. There is no `on: push` here on purpose — "which version is live"
# stays a decision somebody makes, not a side effect of merging.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version WITHOUT the leading v, e.g. 0.12.8'
        required: true

# Two deploys at once would race on the node's .env (both rewrite MICA_VERSION).
# Queue instead of cancelling: a half-applied deploy is worse than a slow one.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Kept for the deployment history / audit trail on the repo, NOT as a gate:
    # this environment deliberately carries no required reviewer.
    #
    # `workflow_dispatch` with no `on: push` already means a person decides to
    # ship — an approval step on top would be a second confirmation of the same
    # decision, which for one maintainer is friction rather than safety. Add
    # reviewers here if that ever stops being true (Settings → Environments).
    environment:
      name: production
      url: https://mica.cloudcele.com

    steps:
      - uses: actions/checkout@v5
        with:
          # Need the tag's tree to fingerprint the compose it was released with.
          ref: v${{ inputs.version }}

      - name: Reject anything that is not X.Y.Z
        run: |
          [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] \
            || { echo "version must be X.Y.Z"; exit 1; }

      - name: Deploy
        env:
          # This key is NOT a root key. `~mica-deploy/.ssh/authorized_keys` pins
          # it to /usr/local/sbin/mica-deploy via `restrict,command=`, which sshd
          # evaluates before accepting the key. Leaked, it can move prod between
          # published versions and nothing else: no shell, no .env, no database.
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          # `ssh ... | tee` hides ssh's exit code behind tee's, and the default
          # runner shell does not set pipefail. On v0.12.9 the node REFUSED the
          # deploy (compose fingerprint mismatch) and this step still reported
          # success — only the health check further down caught it. A deploy step
          # that goes green on a refused deploy is worse than no step at all.
          set -o pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Pinned, not ssh-keyscan'd at runtime: scanning now would trust
          # whatever answers, which is not verification.
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts

          # The compose fingerprint AT THE TAG. The node refuses if its own
          # compose differs, so a version can never be deployed against a compose
          # it was not released with. Sending the file instead would hand this
          # key the power to mount the host root into a container — a hash can
          # only refuse, never inject.
          sha=$(sha256sum deploy/docker-compose.yml | cut -d' ' -f1)

          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes \
            mica-deploy@mica.cloudcele.com \
            "deploy ${{ inputs.version }} $sha" | tee /tmp/deploy.log

          # The node reports which build of the deploy policy it ran. CI may READ
          # the fence that limits it, never install it.
          #
          # Compared against the DEFAULT BRANCH, not the tag being deployed. The
          # deploy policy and the application version are independent timelines:
          # the first run of this check compared against v0.12.8, which predates
          # the script entirely, so `sha256sum` came back empty and it reported
          # drift against nothing ("tag has " with a blank hash) while the node
          # actually matched main exactly. A false alarm teaches people to ignore
          # the alarm.
          git fetch -q --depth 1 origin main 2>/dev/null || true
          want=$(git show FETCH_HEAD:deploy/mica-deploy.sh 2>/dev/null | sha256sum | cut -c1-16)
          got=$(grep -oP 'script_sha=\K\S+' /tmp/deploy.log || true)
          if [ -z "$want" ]; then
            echo "::warning::could not read deploy/mica-deploy.sh from the default branch — drift check skipped"
          elif [ -n "$got" ] && [ "$got" != "$want" ]; then
            echo "::warning::node runs deploy policy $got, default branch has $want — run 'just sync-deploy-script'"
          fi

      - name: Verify prod actually serves this version
        run: |
          got=$(curl -fsS https://mica.cloudcele.com/api/health); echo "$got"
          echo "$got" | grep -q '"version":"${{ inputs.version }}"' \
            || { echo "VERSION MISMATCH — health does not report ${{ inputs.version }}"; exit 1; }
