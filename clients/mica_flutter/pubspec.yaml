name: mica_flutter
description: Flutter client skeleton for Mica.
publish_to: none

version: 0.12.1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Official Flutter/Dart-team localization (gen-l10n + ARB). Not a third-party
  # dep to avoid under principle #1 — flutter_localizations ships in the SDK and
  # intl is the Dart team's own package; this is the framework's i18n, not glue.
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_math_fork: ^0.7.4
  http: ^1.4.0
  web_socket_channel: ^3.0.0
  # Desktop-only: window min-size + size/position memory (M2). Gated behind a
  # conditional import so it never enters the web bundle. In-house exemption #2.
  window_manager: ^0.5.0
  # Exemption #8 (CLAUDE.md): system tray for "close to tray". window_manager
  # has no tray API at all — its own example app pulls this package in to demo a
  # tray — so the alternative is hand-writing Win32 Shell_NotifyIcon plus a Linux
  # StatusNotifier/DBus channel: two native layers, exactly the platform glue the
  # rule says to buy. Same author/publisher as window_manager (leanflutter.dev).
  tray_manager: ^0.5.3
  # Native file dialogs (open/save/directory) for desktop+mobile — used only by
  # the non-web (_stub) variants of pick_file/pick_image/image_actions. Web keeps
  # its dart:html implementations. In-house exemption #3 (platform glue).
  file_picker: ^8.0.0
  # Rich clipboard (read/write image) for desktop — used only by the non-web
  # variants for image paste + "copy image". Web keeps its DOM clipboard path.
  # In-house exemption #4 (platform glue). No Rust build (unlike super_clipboard).
  pasteboard: ^0.5.0
  # dart:ffi helper (Utf16 alloc) for reading the Windows clipboard's registered
  # "PNG" format directly (user32/kernel32 via dart:ffi): pasteboard reads only
  # the flattened CF_DIB, which bakes a transparent PNG's alpha to black; the
  # "PNG" format (browsers register it) keeps transparency. Pure-Dart, already in
  # the tree; Windows-only + guarded + fallback. See rich_paste_stub.dart.
  ffi: ^2.1.0
  # Pure-Dart HTML parser — converts pasted clipboard HTML to Markdown on desktop
  # (web uses dart:html for the same). Not platform glue; a parsing lib.
  html: ^0.15.0
  # NOTE: the Dart `merman` package was dropped — mermaid now renders through the
  # merman Rust engine compiled into OUR FFI (crates/markdown feature `render`,
  # reached via api::render.renderMermaidSvg), the SAME engine the HTML/PDF export
  # uses. One engine on desktop, export == on-screen. Web still uses mermaid.min.js.
  # SVG rasterizer — turns the FFI's merman SVG into a ui.Image on desktop/mobile.
  # In-house exemption #6 (standard rendering capability; self-rolling an SVG
  # renderer is absurd). Used only by the non-web mermaid path. flutter_svg honors
  # geometry + presentation attributes but NOT CSS <style>, so merman's themed SVG
  # is first flattened by our own css inliner (mermaid_svg_inline.dart).
  flutter_svg: ^2.3.0
  # XML tree for that css inliner — merman emits theme as scoped CSS with descendant
  # selectors (`#merman .node rect{fill:..}`); merman documents inline-styling as a
  # host-side boundary (Zed does the same). Pure-Dart parsing lib, not platform glue.
  xml: ^6.5.0
  rust_lib_mica_flutter:
    path: rust_builder
  flutter_rust_bridge: 2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Runs on-device (e.g. the Windows runner) so plugin native libs are present —
  # the only way to exercise the real merman FFI mermaid render path in a test.
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  # Generate AppLocalizations from lib/l10n/*.arb (config in l10n.yaml).
  generate: true
  assets:
    # Tray icon (desktop "close to tray"). .ico because Windows is the only
    # platform where we enable the tray — see close_behavior in
    # window_setup_desktop.dart.
    - assets/tray_icon.ico
  fonts:
    # Crisp CJK for the web (CanvasKit can't use system fonts by name, unlike
    # desktop which defers to 微软雅黑/苹方 — see lib/cjk_fonts.dart). Noto Sans
    # SC Regular, SIL OFL 1.1. DroidSansFallback stays as the broad-coverage tail.
    - family: NotoSansSC
      fonts:
        - asset: fonts/NotoSansSC-Regular.otf
    - family: CJKFallback
      fonts:
        - asset: fonts/DroidSansFallback.ttf
    # Real monospace for code. The generic 'monospace' family does NOT
    # resolve on Flutter web (CanvasKit falls back to Roboto), which made
    # code-block indentation almost invisible.
    - family: RobotoMono
      fonts:
        - asset: fonts/RobotoMono-Regular.ttf
