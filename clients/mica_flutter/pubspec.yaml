name: mica_flutter
description: Flutter client skeleton for Mica.
publish_to: none

version: 0.1.0

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.4.0
  web_socket_channel: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: CJKFallback
      fonts:
        - asset: fonts/DroidSansFallback.ttf
