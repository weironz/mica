name: mica_flutter
description: Flutter client skeleton for Mica.
publish_to: none

version: 0.3.1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_math_fork: ^0.7.4
  http: ^1.4.0
  web_socket_channel: ^3.0.0
  # Desktop-only: window min-size + size/position memory (M2). Gated behind a
  # conditional import so it never enters the web bundle. In-house exemption #2.
  window_manager: ^0.5.0
  # Native file dialogs (open/save/directory) for desktop+mobile — used only by
  # the non-web (_stub) variants of pick_file/pick_image/image_actions. Web keeps
  # its dart:html implementations. In-house exemption #3 (platform glue).
  file_picker: ^8.0.0
  # Rich clipboard (read/write image) for desktop — used only by the non-web
  # variants for image paste + "copy image". Web keeps its DOM clipboard path.
  # In-house exemption #4 (platform glue). No Rust build (unlike super_clipboard).
  pasteboard: ^0.5.0
  # Pure-Dart HTML parser — converts pasted clipboard HTML to Markdown on desktop
  # (web uses dart:html for the same). Not platform glue; a parsing lib.
  html: ^0.15.0
  # Headless pure-Rust Mermaid engine (FFI, no browser/JS) — desktop/mobile render
  # mermaid OFFLINE via the non-web (_stub) variant of mermaid_preview. Web keeps
  # its mermaid.min.js path. In-house exemption #5: a complex domain renderer (same
  # class as flutter_math_fork), self-authoring a mermaid impl is unrealistic.
  # Pinned: 0.x alpha, API still churning. Bundles prebuilt native libs per platform.
  merman: 0.7.0-alpha.1
  # SVG rasterizer — turns merman's SVG into a ui.Image on desktop/mobile.
  # In-house exemption #6 (standard rendering capability; self-rolling an SVG
  # renderer is absurd). Used only by the non-web mermaid path. flutter_svg honors
  # geometry + presentation attributes but NOT CSS <style>, so merman's themed SVG
  # is first flattened by our own css inliner (mermaid_svg_inline.dart).
  flutter_svg: ^2.3.0
  # XML tree for that css inliner — merman emits theme as scoped CSS with descendant
  # selectors (`#merman .node rect{fill:..}`); merman documents inline-styling as a
  # host-side boundary (Zed does the same). Pure-Dart parsing lib, not platform glue.
  xml: ^6.5.0
  rust_lib_mica_flutter:
    path: rust_builder
  flutter_rust_bridge: 2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Runs on-device (e.g. the Windows runner) so plugin native libs are present —
  # the only way to exercise the real merman FFI mermaid render path in a test.
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  fonts:
    # Crisp CJK for the web (CanvasKit can't use system fonts by name, unlike
    # desktop which defers to 微软雅黑/苹方 — see lib/cjk_fonts.dart). Noto Sans
    # SC Regular, SIL OFL 1.1. DroidSansFallback stays as the broad-coverage tail.
    - family: NotoSansSC
      fonts:
        - asset: fonts/NotoSansSC-Regular.otf
    - family: CJKFallback
      fonts:
        - asset: fonts/DroidSansFallback.ttf
    # Real monospace for code. The generic 'monospace' family does NOT
    # resolve on Flutter web (CanvasKit falls back to Roboto), which made
    # code-block indentation almost invisible.
    - family: RobotoMono
      fonts:
        - asset: fonts/RobotoMono-Regular.ttf
