# Production stack behind an EXISTING Traefik (label routing + Let's Encrypt),
# for multi-app servers — no host ports published; HTTPS everywhere.
#
#   .env.prod: DOMAIN, S3_DOMAIN, JWT_SECRET, POSTGRES_PASSWORD,
#              S3_ACCESS_KEY, S3_SECRET_KEY [, MICA_VERSION]
#
# DNS: both DOMAIN and S3_DOMAIN must point at this server. Presigned S3
# URLs embed https://S3_DOMAIN (SigV4 signs the Host header, which Traefik
# forwards unchanged).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-mica}
    volumes:
      - mica-prod-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mica} -d ${POSTGRES_DB:-mica}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rustfs:
    image: rustfs/rustfs:1.0.0-beta.6
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    networks: [default, traefik]
    ports:
      - "9001:9001" # admin console (open the cloud security group to reach it)
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:?set in .env.prod}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:?set in .env.prod}
      RUSTFS_CORS_ALLOWED_ORIGINS: "https://${DOMAIN:?set in .env.prod}"
    volumes:
      - mica-prod-rustfs:/data
    labels:
      traefik.enable: "true"
      traefik.docker.network: traefik-network
      traefik.http.routers.mica-s3.rule: Host(`${S3_DOMAIN:?set in .env.prod}`)
      traefik.http.routers.mica-s3.entrypoints: websecure
      traefik.http.routers.mica-s3.tls: "true"
      traefik.http.routers.mica-s3.tls.certresolver: letsencrypt
      traefik.http.services.mica-s3.loadbalancer.server.port: "9000"

  api:
    image: willdockerhub/mica-api:${MICA_VERSION:-v0.1.5}
    restart: unless-stopped
    environment:
      HTTP_ADDR: 0.0.0.0:8080
      DATABASE_URL: postgres://${POSTGRES_USER:-mica}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mica}
      JWT_SECRET: ${JWT_SECRET:?set in .env.prod}
      S3_ENDPOINT: https://${S3_DOMAIN}
      S3_BUCKET: ${S3_BUCKET:-mica}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_PRESIGN_TTL_SECONDS: "604800"
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_started

  web:
    image: willdockerhub/mica-web:${MICA_VERSION:-v0.1.5}
    restart: unless-stopped
    networks: [default, traefik]
    depends_on:
      - api
    labels:
      traefik.enable: "true"
      traefik.docker.network: traefik-network
      traefik.http.routers.mica.rule: Host(`${DOMAIN}`)
      traefik.http.routers.mica.entrypoints: websecure
      traefik.http.routers.mica.tls: "true"
      traefik.http.routers.mica.tls.certresolver: letsencrypt
      traefik.http.services.mica.loadbalancer.server.port: "80"

  # Encrypted, deduplicated, incremental backup of every workspace (Markdown +
  # images) to Aliyun OSS, via mica-cli's built-in restic-format engine. Opt-in:
  # it only starts under the `backup` profile, once .env has a read-scoped token
  # and the repo/OSS creds:
  #   docker compose --profile backup up -d backup
  # Talks to the API over the internal network (no token ever leaves the host).
  backup:
    image: willdockerhub/mica-cli:${MICA_VERSION:-v0.1.5}
    profiles: ["backup"]
    restart: unless-stopped
    depends_on:
      - api
    environment:
      MICA_SERVER: http://api:8080
      MICA_TOKEN: ${MICA_BACKUP_TOKEN:-}            # a read-scoped Mica token
      MICA_BACKUP_REPO: ${MICA_BACKUP_REPO:-opendal:s3:/mica}
      MICA_BACKUP_PASSWORD: ${MICA_BACKUP_PASSWORD:-}
      # OpenDAL S3/OSS backend options — one option per line (MICA_OPT_<KEY> maps
      # to the opendal option <key>), sourced from the readable OSS_* vars in
      # .env so every value stands alone and the AccessKey rotates without
      # touching the rest. enable_virtual_host_style is required for Aliyun OSS.
      MICA_OPT_BUCKET: ${OSS_BUCKET:-}
      MICA_OPT_ENDPOINT: ${OSS_ENDPOINT:-}
      MICA_OPT_REGION: ${OSS_REGION:-}
      MICA_OPT_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      MICA_OPT_SECRET_ACCESS_KEY: ${OSS_SECRET_ACCESS_KEY:-}
      MICA_OPT_ENABLE_VIRTUAL_HOST_STYLE: "true"
      MICA_OPT_ROOT: ${OSS_ROOT:-mica}
      BACKUP_HOUR: ${BACKUP_HOUR:-3}
      KEEP_DAILY: ${KEEP_DAILY:-14}
      KEEP_WEEKLY: ${KEEP_WEEKLY:-8}
      KEEP_MONTHLY: ${KEEP_MONTHLY:-6}
    volumes:
      - mica-prod-backup:/var/lib/mica/export

networks:
  traefik:
    external: true
    name: traefik-network

volumes:
  mica-prod-postgres:
  mica-prod-rustfs:
  mica-prod-backup:
