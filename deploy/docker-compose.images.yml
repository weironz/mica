# Image-only production stack — for servers that can't build from source or
# pull from Docker Hub (images are `docker save`d locally and `docker load`ed
# there; see docs/deploy.md "Offline/China deployment").
#
#   /opt/mica/.env.prod  must define: PUBLIC_HOST, JWT_SECRET,
#   POSTGRES_PASSWORD, S3_ACCESS_KEY, S3_SECRET_KEY [, EXTRA_ORIGINS]
#
# PUBLIC_HOST is what browsers reach (domain or IP, no scheme) — presigned
# S3 URLs embed it.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-mica}
    volumes:
      - mica-prod-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mica} -d ${POSTGRES_DB:-mica}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rustfs:
    image: rustfs/rustfs:1.0.0-beta.6
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    ports:
      - "9000:9000"
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ENABLE: "false"
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:?set in .env.prod}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:?set in .env.prod}
      # The app origin(s); browsers presign-PUT/GET directly against :9000.
      RUSTFS_CORS_ALLOWED_ORIGINS: "http://${PUBLIC_HOST:?set in .env.prod}${EXTRA_ORIGINS:-}"
    volumes:
      - mica-prod-rustfs:/data

  api:
    image: willdockerhub/mica-api:${MICA_VERSION:-v0.1.4}
    restart: unless-stopped
    environment:
      HTTP_ADDR: 0.0.0.0:8080
      DATABASE_URL: postgres://${POSTGRES_USER:-mica}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mica}
      JWT_SECRET: ${JWT_SECRET:?set in .env.prod}
      S3_ENDPOINT: http://${PUBLIC_HOST}:9000
      S3_BUCKET: ${S3_BUCKET:-mica}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_PRESIGN_TTL_SECONDS: "604800"
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_started

  web:
    image: willdockerhub/mica-web:${MICA_VERSION:-v0.1.4}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  mica-prod-postgres:
  mica-prod-rustfs:
