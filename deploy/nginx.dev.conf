# Dev web server: same routing as production nginx, but /api and /ws proxy
# to the HOST-run api (fast `cargo run` cycle stays outside docker).
worker_processes 1;

events {
  worker_connections 256;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  client_max_body_size 1g;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Dev: never cache ANYTHING. Stale main.dart.js after a rebuild cost us
    # hours of debugging phantom bugs against old code — fresh beats fast on
    # a bind-mounted dev bundle. (Production keeps long-lived caching.)
    location / {
      add_header Cache-Control "no-store";
      try_files $uri $uri/ /index.html;
    }

    location /api/ {
      proxy_pass http://host.docker.internal:8080;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_read_timeout 300s;
    }
    # Server-rendered password-reset page → host api (exact match beats the SPA
    # fallback regardless of block order).
    location = /reset-password {
      proxy_pass http://host.docker.internal:8080;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }
    location /ws/ {
      proxy_pass http://host.docker.internal:8080;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_read_timeout 1h;
    }
  }
}
