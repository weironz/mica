worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  gzip on;
  gzip_types text/plain text/css application/javascript application/json application/wasm;

  # Workspace ZIP imports upload in one request.
  client_max_body_size 1g;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  server {
    listen 80;
    server_name _;

    # Flutter web bundle (static).
    root /usr/share/nginx/html;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
    }

    # Never cache Flutter's entry files. These have FIXED names (not
    # content-hashed) — index.html loads flutter_bootstrap.js loads main.dart.js
    # — so without no-cache a deploy is invisible until every returning user
    # hard-refreshes. (main.dart.js was missing here, which is exactly how
    # v0.5.2's inline math looked "not deployed" on cached browsers.) Etag still
    # lets an unchanged file 304, so this costs a revalidation round-trip, not a
    # re-download. Content-hashed assets (canvaskit/, fonts) stay cacheable.
    location = /index.html {
      add_header Cache-Control "no-cache";
    }
    location = /flutter_bootstrap.js {
      add_header Cache-Control "no-cache";
    }
    location = /main.dart.js {
      add_header Cache-Control "no-cache";
    }
    location = /flutter_service_worker.js {
      add_header Cache-Control "no-cache";
    }

    # Public share pages (/s/{token}) → backend. Must precede the SPA fallback,
    # or `try_files` would serve index.html instead of the server-rendered page.
    location /s/ {
      proxy_pass http://api:8080;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Password-reset page (/reset-password, GET form + POST) → backend. Server-
    # rendered like /s/, so it must also precede the SPA fallback. Exact match:
    # nothing else hangs off this path.
    location = /reset-password {
      proxy_pass http://api:8080;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # REST API → backend.
    location /api/ {
      proxy_pass http://api:8080;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
    }

    # WebSocket rooms (realtime collaboration) → backend, with upgrade.
    location /ws/ {
      proxy_pass http://api:8080;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_read_timeout 1h;
      proxy_send_timeout 1h;
    }
  }
}
