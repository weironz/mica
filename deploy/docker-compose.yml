# Production stack behind an EXISTING Traefik (label routing + Let's Encrypt),
# for multi-app servers — no host ports published; HTTPS everywhere.
#
#   .env.prod: DOMAIN, S3_DOMAIN, JWT_SECRET, POSTGRES_PASSWORD,
#              S3_ACCESS_KEY, S3_SECRET_KEY [, MICA_VERSION]
#
# DNS: both DOMAIN and S3_DOMAIN must point at this server. Presigned S3
# URLs embed https://S3_DOMAIN (SigV4 signs the Host header, which Traefik
# forwards unchanged).

# Bound every container's logs: json-file's default is unlimited, so one chatty
# service (or a crash loop) fills the disk and takes the whole node down. Cap at
# 3×10 MB per container and let the ring buffer drop the oldest — logs are a
# convenience here, not the record of truth. Applied to all services via anchor.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-mica}
    volumes:
      - mica-prod-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mica} -d ${POSTGRES_DB:-mica}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rustfs:
    image: rustfs/rustfs:1.0.0-beta.6
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - "no-new-privileges:true"
    networks: [default, traefik]
    ports:
      - "9001:9001" # admin console (open the cloud security group to reach it)
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:?set in .env.prod}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:?set in .env.prod}
      RUSTFS_CORS_ALLOWED_ORIGINS: "https://${DOMAIN:?set in .env.prod}"
    volumes:
      - mica-prod-rustfs:/data
    labels:
      traefik.enable: "true"
      traefik.docker.network: traefik-network
      traefik.http.routers.mica-s3.rule: Host(`${S3_DOMAIN:?set in .env.prod}`)
      traefik.http.routers.mica-s3.entrypoints: websecure
      traefik.http.routers.mica-s3.tls: "true"
      traefik.http.routers.mica-s3.tls.certresolver: letsencrypt
      traefik.http.services.mica-s3.loadbalancer.server.port: "9000"

  # The three mica images are built + pushed together by CI on a `v*` tag
  # (.github/workflows/release.yml) and MUST move as a set —
  # MICA_VERSION keys all of them.
  #
  # MICA_REGISTRY defaults to Aliyun ACR: prod is in CN, and pulling from
  # Docker Hub there only worked through a third-party pull-through mirror
  # (docker.1ms.run) that caches tag->digest — a stale-image trap. ACR is
  # first-party; Docker Hub stays an off-site copy you can switch to with
  # MICA_REGISTRY=willdockerhub. Tags are immutable versions, never `latest`.
  api:
    image: ${MICA_REGISTRY:-registry.cn-shenzhen.aliyuncs.com/willspace}/mica-api:${MICA_VERSION:-v0.5.0}
    restart: unless-stopped
    logging: *default-logging
    environment:
      # Identify as production: enables the restrictive CORS default and
      # hard-ignores any MICA_SEED_TEST_USER. Without this the server defaults to
      # Development even in prod (config.rs `Environment`).
      APP_ENV: production
      HTTP_ADDR: 0.0.0.0:8080
      DATABASE_URL: postgres://${POSTGRES_USER:-mica}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mica}
      JWT_SECRET: ${JWT_SECRET:?set in .env.prod}
      S3_ENDPOINT: https://${S3_DOMAIN}
      S3_BUCKET: ${S3_BUCKET:-mica}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_PRESIGN_TTL_SECONDS: "604800"
      # Public self-registration. Defaults open (current behaviour); set
      # MICA_REGISTRATION_ENABLED=false in the node's .env to lock this instance
      # to its existing accounts (POST /auth/register then 403s).
      MICA_REGISTRATION_ENABLED: "${MICA_REGISTRATION_ENABLED:-true}"
      # Public origin used to build the emailed password-reset link
      # ({base}/reset-password?token=…). Defaults to https://<DOMAIN>.
      MICA_APP_BASE_URL: "${MICA_APP_BASE_URL:-https://${DOMAIN}}"
      # Password-reset email delivery. Default "log" writes the reset link to the
      # server log and sends nothing (the flow still works — the operator reads
      # the link out of the logs). Set MICA_MAIL_BACKEND=directmail plus the vars
      # below in the node's .env to send via Aliyun DirectMail (邮件推送):
      #   MICA_MAIL_FROM            verified sender address (DirectMail AccountName)
      #   MICA_MAIL_FROM_NAME       optional display name
      #   MICA_MAIL_ACCESS_KEY_ID / _SECRET   a RAM AccessKey scoped to DirectMail
      #   MICA_MAIL_REGION          RegionId (default cn-hangzhou)
      MICA_MAIL_BACKEND: "${MICA_MAIL_BACKEND:-log}"
      MICA_MAIL_FROM: "${MICA_MAIL_FROM:-}"
      MICA_MAIL_FROM_NAME: "${MICA_MAIL_FROM_NAME:-}"
      MICA_MAIL_ACCESS_KEY_ID: "${MICA_MAIL_ACCESS_KEY_ID:-}"
      MICA_MAIL_ACCESS_KEY_SECRET: "${MICA_MAIL_ACCESS_KEY_SECRET:-}"
      MICA_MAIL_REGION: "${MICA_MAIL_REGION:-cn-hangzhou}"
      MICA_MAIL_ENDPOINT: "${MICA_MAIL_ENDPOINT:-}"
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_started

  web:
    image: ${MICA_REGISTRY:-registry.cn-shenzhen.aliyuncs.com/willspace}/mica-web:${MICA_VERSION:-v0.5.0}
    restart: unless-stopped
    logging: *default-logging
    networks: [default, traefik]
    depends_on:
      - api
    labels:
      traefik.enable: "true"
      traefik.docker.network: traefik-network
      traefik.http.routers.mica.rule: Host(`${DOMAIN}`)
      traefik.http.routers.mica.entrypoints: websecure
      traefik.http.routers.mica.tls: "true"
      traefik.http.routers.mica.tls.certresolver: letsencrypt
      traefik.http.services.mica.loadbalancer.server.port: "80"

  # Encrypted, deduplicated, incremental backup of every workspace (Markdown +
  # images) to Aliyun OSS, via mica-cli's built-in restic-format engine. Opt-in:
  # it only starts under the `backup` profile, once .env has a read-scoped token
  # and the repo/OSS creds:
  #   docker compose --profile backup up -d backup
  # Talks to the API over the internal network (no token ever leaves the host).
  backup:
    image: ${MICA_REGISTRY:-registry.cn-shenzhen.aliyuncs.com/willspace}/mica-cli:${MICA_VERSION:-v0.5.0}
    profiles: ["backup"]
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - api
    environment:
      MICA_SERVER: http://api:8080
      MICA_TOKEN: ${MICA_BACKUP_TOKEN:-}            # a read-scoped Mica token
      # rustic repo encryption password — SAVE OFF-HOST (lose it, lose the repo).
      RUSTIC_PASSWORD: ${MICA_BACKUP_PASSWORD:-}
      # pg_dump connection string for the off-site DB snapshot (full-instance DR:
      # users/memberships/CRDT history the content export does NOT capture). The
      # backup container shares the default network with postgres, so point it at
      # the internal host, e.g. in .env:
      #   MICA_BACKUP_PGURL=postgres://mica:<POSTGRES_PASSWORD>@postgres:5432/mica
      # Unset → mica-backup.sh skips pg_dump and warns (content-only backup).
      MICA_BACKUP_PGURL: ${MICA_BACKUP_PGURL:-}
      # Dead man's switch: mica-backup-loop.sh pings this on success and
      # <URL>/fail on a failed run. Unset → no ping. e.g. a healthchecks.io URL.
      HEALTHCHECK_URL: ${HEALTHCHECK_URL:-}
      # opendal S3 backend → Aliyun OSS. mica-backup.sh renders these into
      # /etc/rustic/rustic.toml (virtual-host style is forced on, required for
      # OSS). Each value stands alone so the AccessKey rotates without touching
      # the rest; use a fresh OSS_ROOT prefix to share a bucket with another repo.
      OSS_BUCKET: ${OSS_BUCKET:-}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      OSS_REGION: ${OSS_REGION:-}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_SECRET_ACCESS_KEY: ${OSS_SECRET_ACCESS_KEY:-}
      OSS_ROOT: ${OSS_ROOT:-mica}
      BACKUP_HOUR: ${BACKUP_HOUR:-3}
      KEEP_DAILY: ${KEEP_DAILY:-7}
      KEEP_WEEKLY: ${KEEP_WEEKLY:-4}
      KEEP_MONTHLY: ${KEEP_MONTHLY:-6}
    volumes:
      - mica-prod-backup:/var/lib/mica/export

networks:
  traefik:
    external: true
    name: traefik-network

volumes:
  mica-prod-postgres:
  mica-prod-rustfs:
  mica-prod-backup:
