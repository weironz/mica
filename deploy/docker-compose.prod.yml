# Production single-server deployment: nginx (static web + reverse proxy),
# the Rust API, PostgreSQL, and RustFS object storage.
#
#   cp deploy/.env.prod.example .env.prod   # then edit (SERVER_IP, secrets!)
#   ./deploy/deploy.sh                      # build + (re)start everything
#
# Only ports 80 (app) and 9000 (S3, presigned browser access) are public.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-mica}
    volumes:
      - mica-prod-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mica} -d ${POSTGRES_DB:-mica}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    ports:
      - "9000:9000" # S3 API — public: browsers use presigned URLs directly
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ENABLE: "false"
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:?set in .env.prod}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:?set in .env.prod}
      # Browsers presign-PUT/GET directly against :9000 from the app origin.
      RUSTFS_CORS_ALLOWED_ORIGINS: "http://${SERVER_IP:?set in .env.prod}"
    volumes:
      - mica-prod-rustfs:/data

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    environment:
      HTTP_ADDR: 0.0.0.0:8080
      DATABASE_URL: postgres://${POSTGRES_USER:-mica}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mica}
      JWT_SECRET: ${JWT_SECRET:?set in .env.prod}
      # Must be BROWSER-reachable — presigned URLs embed this host.
      S3_ENDPOINT: http://${SERVER_IP}:9000
      S3_BUCKET: ${S3_BUCKET:-mica}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_PRESIGN_TTL_SECONDS: "604800"
      # S3_PUBLIC_BASE_URL stays UNSET: the bucket is private, GETs are signed.
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_started

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/web:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  mica-prod-postgres:
  mica-prod-rustfs:
