services:
  postgres:
    image: postgres:16-alpine
    container_name: mica-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mica
      POSTGRES_PASSWORD: mica
      POSTGRES_DB: mica
    ports:
      - "5432:5432"
    volumes:
      - mica-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mica -d mica"]
      interval: 5s
      timeout: 5s
      retries: 10

  # S3-compatible object storage for file/image uploads (RustFS — a maintained
  # Rust alternative to MinIO). S3 API on :9000, web console on :9001.
  rustfs:
    image: rustfs/rustfs:1.0.0-beta.6
    container_name: mica-rustfs
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console (http://localhost:9001)
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      # RustFS has no per-bucket CORS API; allowed origins are server-wide here.
      # "*" is fine for dev so the Flutter web app can presign-PUT directly.
      RUSTFS_CORS_ALLOWED_ORIGINS: "*"
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: "*"
      # Single-disk local dev: skip the multi-disk erasure topology check.
      RUSTFS_UNSAFE_BYPASS_DISK_CHECK: "true"
      RUSTFS_OBS_LOGGER_LEVEL: info
    volumes:
      - mica-rustfs-data:/data

  # The API. Runs from source with the official Rust toolchain image — this file
  # never builds an image.
  #
  # There used to be a second service here that built deploy/Dockerfile.api.
  # Nothing used it: prod is deploy/docker-compose.yml (shipped by
  # `just deploy-prod`), parity is deploy/docker-compose.single.yml running the
  # REAL images, and `just docker-build` calls `docker build` directly. Its only
  # live effect was that a bare `docker compose up -d` compiled the whole
  # workspace in --release inside a container — and its S3_ENDPOINT still
  # pointed at a LAN address from a machine that no longer exists, which is how
  # long nobody had run it. Deleted; prod config belongs in deploy/.
  #
  # Source is bind-mounted and `target/` + the cargo registry live in named
  # volumes, so a rebuild is an ordinary incremental cargo build that survives
  # restarts: ~5 s for a one-line change, vs minutes for an image rebuild.
  api:
    image: rust:1.97-slim-bookworm
    container_name: mica-api
    working_dir: /src
    command: cargo run -p mica-api-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      HTTP_ADDR: 0.0.0.0:8080
      DATABASE_URL: postgres://mica:mica@postgres:5432/mica
      DATABASE_MAX_CONNECTIONS: 10
      JWT_SECRET: change-me-in-development
      ACCESS_TOKEN_TTL_SECONDS: 86400
      RUST_LOG: mica_api_server=debug,mica_app_core=debug,mica_infra=debug
      CARGO_TERM_COLOR: never
      # The backend only SIGNS presigned URLs, so this must be the host the
      # BROWSER can reach — not the compose service name.
      S3_ENDPOINT: http://127.0.0.1:9000
      S3_REGION: us-east-1
      S3_BUCKET: mica
      S3_ACCESS_KEY: rustfsadmin
      S3_SECRET_KEY: rustfsadmin
      S3_FORCE_PATH_STYLE: "true"
      S3_PRESIGN_TTL_SECONDS: 604800
      S3_MAX_UPLOAD_BYTES: 52428800
    volumes:
      - .:/src
      # Linux build artifacts stay in volumes: sharing ./target with the host
      # would make the two toolchains fight over the same directory.
      - mica-cargo-target:/src/target
      - mica-cargo-registry:/usr/local/cargo/registry
    ports:
      - "8080:8080"

  # Dev web server: serves the live Flutter bundle (bind mount — rebuild and
  # refresh, no restart) with production-identical routing on :8090 (host
  # port 80 is taken on this VM).
  web:
    image: nginx:alpine
    container_name: mica-web-dev
    restart: unless-stopped
    ports:
      - "8090:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./deploy/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ./clients/mica_flutter/build/web:/usr/share/nginx/html:ro

volumes:
  mica-cargo-target:
  mica-cargo-registry:
  mica-postgres-data:
  mica-rustfs-data:
