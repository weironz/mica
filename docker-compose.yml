services:
  postgres:
    image: postgres:16-alpine
    container_name: mica-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mica
      POSTGRES_PASSWORD: mica
      POSTGRES_DB: mica
    ports:
      - "5432:5432"
    volumes:
      - mica-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mica -d mica"]
      interval: 5s
      timeout: 5s
      retries: 10

  # S3-compatible object storage for file/image uploads (RustFS — a maintained
  # Rust alternative to MinIO). S3 API on :9000, web console on :9001.
  rustfs:
    image: rustfs/rustfs:latest
    container_name: mica-rustfs
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console (http://localhost:9001)
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      # RustFS has no per-bucket CORS API; allowed origins are server-wide here.
      # "*" is fine for dev so the Flutter web app can presign-PUT directly.
      RUSTFS_CORS_ALLOWED_ORIGINS: "*"
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: "*"
      # Single-disk local dev: skip the multi-disk erasure topology check.
      RUSTFS_UNSAFE_BYPASS_DISK_CHECK: "true"
      RUSTFS_OBS_LOGGER_LEVEL: info
    volumes:
      - mica-rustfs-data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mica-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      HTTP_ADDR: 0.0.0.0:8080
      DATABASE_URL: postgres://mica:mica@postgres:5432/mica
      DATABASE_MAX_CONNECTIONS: 10
      JWT_SECRET: change-me-in-development
      ACCESS_TOKEN_TTL_SECONDS: 86400
      RUST_LOG: mica_api_server=debug,mica_app_core=debug,mica_infra=debug,tower_http=debug
      # The backend makes NO network calls to S3 — it only signs presigned URLs
      # that the BROWSER fetches. So both the upload (PUT) endpoint and the
      # download (GET) base must be signed against the browser-reachable host.
      S3_ENDPOINT: http://192.168.73.6:9000
      S3_PUBLIC_BASE_URL: http://192.168.73.6:9000
      S3_REGION: us-east-1
      S3_BUCKET: mica
      S3_ACCESS_KEY: rustfsadmin
      S3_SECRET_KEY: rustfsadmin
      S3_FORCE_PATH_STYLE: "true"
      S3_PRESIGN_TTL_SECONDS: 900
      S3_MAX_UPLOAD_BYTES: 52428800
    ports:
      - "8080:8080"

volumes:
  mica-postgres-data:
  mica-rustfs-data:
